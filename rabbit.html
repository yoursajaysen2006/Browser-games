<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rabbit Run Pro 🐰</title>
    <style>
        :root {
            --primary: #4CAF50;
            --danger: #ff4757;
            --gold: #ffa502;
            --sky: #70a1ff;
        }
        * { touch-action: manipulation; box-sizing: border-box; -webkit-user-select: none; }
        body { 
            margin: 0; background: #2f3542; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden;
        }
        #game-container { 
            position: relative; width: 100%; max-width: 800px; 
            aspect-ratio: 2/1; overflow: hidden; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 4px solid #ffffff22;
        }
        canvas { background: linear-gradient(to bottom, #70a1ff, #f1f2f6); width: 100%; height: 100%; display: block; }
        
        .hud {
            position: absolute; top: 0; left: 0; right: 0; padding: 20px;
            display: flex; justify-content: space-between; align-items: flex-start;
            pointer-events: none; z-index: 10;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 12px; color: white;
            font-size: 20px; font-weight: 800; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 8px;
        }
        #booster-timer {
            color: var(--gold); border: 2px solid var(--gold);
            animation: pulse 1s infinite; display: none;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 20; color: white; text-align: center;
        }
        .btn {
            background: var(--primary); color: white; border: none;
            padding: 16px 40px; font-size: 24px; font-weight: bold;
            border-radius: 50px; cursor: pointer; transition: transform 0.2s;
            margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn:hover { background: #45a049; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body onclick="jump()" ontouchstart="jump()">

    <div id="game-container">
        <div class="hud">
            <div class="stat-box">🥕 <span id="score">0</span></div>
            <div id="booster-timer" class="stat-box">🧚🏻 FLYING: <span id="timer">5</span>s</div>
            <div class="stat-box" id="lives">❤️❤️❤️</div>
        </div>

        <div id="menu" class="overlay">
            <h1 style="font-size: 48px; margin: 0;">RABBIT RUN</h1>
            <p>Jump to avoid Tigers! Catch Angels to Fly!</p>
            <button class="btn" onclick="initGame(event)">START ADVENTURE</button>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let state = {
            active: false,
            score: 0,
            lives: 3,
            speed: 6,
            isFlying: false,
            flyTime: 0,
            obstacles: [],
            scenery: [],
            spawnTimer: null
        };

        const rabbit = {
            x: 100, y: 300, 
            w: 50, h: 50,
            dy: 0, 
            jump: -14, 
            gravity: 0.7,
            grounded: true,
            char: "🐰"
        };

        function initGame(e) {
            if(e) e.stopPropagation();
            // Reset state and clear old intervals
            clearTimeout(state.spawnTimer);
            state = { 
                active: true, score: 0, lives: 3, speed: 6, 
                isFlying: false, flyTime: 0, obstacles: [], 
                scenery: [], spawnTimer: null 
            };
            
            // Generate initial scenery
            for(let i=0; i<5; i++) {
                state.scenery.push({x: i * 200, type: Math.random() > 0.5 ? '🌳' : '🌿'});
            }

            rabbit.y = 300;
            rabbit.dy = 0;
            document.getElementById('menu').style.display = 'none';
            updateUI();
            spawn();
            gameLoop();
        }

        function jump() {
            if (!state.active) return;
            if (state.isFlying) {
                rabbit.dy = -7; 
            } else if (rabbit.grounded) {
                rabbit.dy = rabbit.jump;
                rabbit.grounded = false;
            }
        }

        function spawn() {
            if (!state.active) return;
            const r = Math.random();
            let type = 'carrot', char = '🥕';
            
            if (r > 0.7 && r < 0.95) { type = 'tiger'; char = '🐯'; }
            else if (r >= 0.95) { type = 'angel'; char = '👼🏻'; }

            state.obstacles.push({ x: 850, y: 310, type, char });
            
            // Fix: Maintain a dynamic spawn rate based on speed
            let nextSpawn = Math.max(700, 2200 - (state.speed * 120));
            state.spawnTimer = setTimeout(spawn, nextSpawn);
        }

        function updateUI() {
            document.getElementById('score').innerText = state.score;
            document.getElementById('lives').innerText = "❤️".repeat(state.lives);
            const timerBox = document.getElementById('booster-timer');
            if (state.isFlying) {
                timerBox.style.display = 'flex';
                document.getElementById('timer').innerText = Math.ceil(state.flyTime / 60);
            } else {
                timerBox.style.display = 'none';
            }
        }

        function gameLoop() {
            if (!state.active) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Background Scenery (Parallax)
            ctx.font = "40px Arial";
            for (let i = state.scenery.length - 1; i >= 0; i--) {
                let s = state.scenery[i];
                s.x -= state.speed * 0.7; // Moves slower than ground
                ctx.fillText(s.type, s.x, 345);
                if (s.x < -100) {
                    s.x = 900;
                    s.type = Math.random() > 0.5 ? '🌳' : '🌿';
                }
            }

            // 2. Ground
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(0, 350, canvas.width, 50);

            // 3. Physics Logic
            if (state.isFlying) {
                rabbit.char = "🧚🏻";
                rabbit.dy += 0.4;
                state.flyTime--;
                if (state.flyTime <= 0) state.isFlying = false;
            } else {
                rabbit.char = "🐰";
                rabbit.dy += rabbit.gravity;
            }

            rabbit.y += rabbit.dy;

            // Bounds
            if (rabbit.y > 300) { rabbit.y = 300; rabbit.dy = 0; rabbit.grounded = true; }
            if (rabbit.y < 10) { rabbit.y = 10; rabbit.dy = 0; } 

            // 4. Draw Character
            ctx.font = "50px Arial";
            ctx.fillText(rabbit.char, rabbit.x, rabbit.y + 40);

            // 5. Obstacles & Collision
            for (let i = state.obstacles.length - 1; i >= 0; i--) {
                let o = state.obstacles[i];
                o.x -= state.speed;
                ctx.fillText(o.char, o.x, 345);

                // Precise Collision Detection
                let dx = Math.abs(o.x - rabbit.x);
                let dy = Math.abs(310 - rabbit.y); 

                if (dx < 40 && dy < 45) {
                    if (o.type === 'carrot') { 
                        state.score += 10; 
                        state.obstacles.splice(i, 1);
                    } else if (o.type === 'angel') { 
                        state.isFlying = true; 
                        state.flyTime = 300; 
                        state.obstacles.splice(i, 1);
                    } else if (o.type === 'tiger') {
                        // Bug Fix: Only die if not flying high or not in "Angel" mode
                        if (!state.isFlying) {
                            state.lives--;
                            state.obstacles.splice(i, 1);
                            if (state.lives <= 0) die();
                        }
                    }
                    updateUI();
                }
                if (o.x < -100) state.obstacles.splice(i, 1);
            }

            state.speed += 0.001; 
            requestAnimationFrame(gameLoop);
        }

        function die() {
            state.active = false;
            clearTimeout(state.spawnTimer);
            const menu = document.getElementById('menu');
            menu.style.display = 'flex';
            document.querySelector('#menu h1').innerText = "GAME OVER";
            document.querySelector('#menu p').innerText = `Final Score: ${state.score}`;
            document.querySelector('.btn').innerText = "RESTART";
        }
    </script>
</body>
</html>
